<?xml version="1.0" encoding="UTF-8"?>
<!-- QuietStor — The Door (nav logo, 40px)
     Brand mark aligned with the app's DoorIcon (DS V13).
     NOTE: for pixel-parity with the app, swap the door group below
     with the canonical path from DoorIcon.tsx in the app repo. -->
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="QuietStor">
  <title>QuietStor</title>
  <defs>
    <linearGradient id="d-bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#141615"/>
      <stop offset="100%" stop-color="#0b0c0c"/>
    </linearGradient>
    <linearGradient id="d-slit" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#27c860" stop-opacity="0"/>
      <stop offset="30%" stop-color="#27c860" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#27c860" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#27c860" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="1" y="1" width="38" height="38" rx="10" fill="url(#d-bg)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- door frame -->
  <rect x="12" y="9" width="16" height="22" rx="2.5" fill="none" stroke="rgba(240,237,232,0.5)" stroke-width="1.6"/>

  <!-- door leaf, ajar (hinged left, opening toward viewer) -->
  <path d="M13.6 10.6 L24.2 12.4 L24.2 29.6 L13.6 29.4 Z" fill="#141615" stroke="rgba(240,237,232,0.75)" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- handle -->
  <circle cx="22.1" cy="21" r="1.15" fill="#f0ede8" opacity="0.85"/>

  <!-- light escaping through the opening edge -->
  <rect x="25.4" y="10.5" width="1.8" height="19" rx="0.9" fill="url(#d-slit)"/>
</svg>
