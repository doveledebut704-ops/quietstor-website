<?xml version="1.0" encoding="UTF-8"?>
<!-- QuietStor — PLAY STORE ICON (512×512px) -->
<!-- Design: "Glass Shield" — combined layers, full square -->
<!-- Google Play applies rounded corners automatically (30% radius) -->
<!-- Do NOT add rounded corners or shadows -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>QuietStor — Play Store Icon (Glass Shield)</title>

  <defs>
    <linearGradient id="ps-bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <linearGradient id="ps-shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="40%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>

    <linearGradient id="ps-shine" x1="0.5" y1="0" x2="0.5" y2="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.25" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <clipPath id="ps-clip">
      <path d="M256 104 C256 104 370 137 370 137 C370 137 370 261 370 261 C370 337 256 403 256 403 C256 403 142 337 142 261 C142 261 142 137 142 137 Z" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#ps-bg)" />

  <!-- Shield (scaled to 512: centered, ~228px wide) -->
  <path
    d="M256 104 C256 104 370 137 370 137 C370 137 370 261 370 261 C370 337 256 403 256 403 C256 403 142 337 142 261 C142 261 142 137 142 137 Z"
    fill="url(#ps-shield)"
  />

  <!-- Glass shine -->
  <g clip-path="url(#ps-clip)">
    <ellipse cx="256" cy="152" rx="124" ry="95" fill="url(#ps-shine)" />
  </g>

  <!-- Edge highlight -->
  <path
    d="M256 104 C256 104 370 137 370 137 C370 137 370 261 370 261 C370 337 256 403 256 403 C256 403 142 337 142 261 C142 261 142 137 142 137 Z"
    fill="none"
    stroke="white"
    stroke-width="2"
    stroke-opacity="0.12"
  />
</svg>
