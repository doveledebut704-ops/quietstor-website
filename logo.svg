<?xml version="1.0" encoding="UTF-8"?>
<!-- QuietStor — Website Logo (Frost Crown) -->
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <title>QuietStor</title>

  <defs>
    <linearGradient id="w-bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>

    <linearGradient id="w-shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#dcfce7"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="75%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>

    <linearGradient id="w-shine" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="w-clip">
      <path d="M20 7C20 7 32 11 32 11V23C32 30 20 36 20 36C20 36 8 30 8 23V11Z"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="40" height="40" rx="9" fill="url(#w-bg)"/>

  <!-- Shield -->
  <path
    d="M20 7C20 7 32 11 32 11V23C32 30 20 36 20 36C20 36 8 30 8 23V11Z"
    fill="url(#w-shield)"
  />

  <!-- Glass shine -->
  <g clip-path="url(#w-clip)">
    <ellipse cx="20" cy="11" rx="13" ry="8" fill="url(#w-shine)"/>
  </g>

  <!-- Edge -->
  <path
    d="M20 7C20 7 32 11 32 11V23C32 30 20 36 20 36C20 36 8 30 8 23V11Z"
    fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0.2"
  />
</svg>
